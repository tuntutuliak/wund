{% load static %}
<section class="section section-lg bg-image bg-image-light" id="newsletter" style="background-image: url({% static 'img/news_back_1920X432.jpg' %});">
  <div class="container">
    <div class="row justify-content-center text-center">
      <div class="col-sm-10 col-md-8 col-lg-7 col-xl-6">
        <h2 class="wow-outer text-title-block-white"><span class="wow slideInUp">Подписка на новости</span></h2>
        <p class="text-white text-left wow-outer"><span class="wow slideInLeft">Будьте в курсе наших новостей и обновлений. Введите ваш e-mail и подпишитесь на рассылку.</span></p>
        <form id="subscribe-form" class="rd-form form-inline wow fadeIn js-subscribe-form" data-wow-delay=".2s" method="post" action="{% url 'subscribe' %}">
          {% csrf_token %}
          {{ subscribe_form.website }}
          <div class="form-wrap">
            <label class="form-label" for="subscribe-form-email">Ваш e-mail</label>
            {{ subscribe_form.email }}
            {% if subscribe_form.email.errors %}
              <span class="form-validation-error">{{ subscribe_form.email.errors.0 }}</span>
            {% endif %}
          </div>
          <div class="form-button">
            <button class="button button-primary button-winona button-secondary" type="submit">Подписаться</button>
          </div>
          <div id="subscribe-form-message" class="mt-2" aria-live="polite"></div>
        </form>
      </div>
    </div>
  </div>
</section>
